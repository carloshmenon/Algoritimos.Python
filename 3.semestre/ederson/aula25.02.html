<forms> <!--aqui estamos vendo as opcoes de data e hora-->
    <fieldser id="data">
        <legend>Data de Nascimento</legend>
        <P>data<input type="date" name="date" id="campos" size="20" maxlength="10" 
        placeholder="00-00-0000"></P>
    </fieldser>
</forms>

<label for="hora">horario de atendimento:</label>
    <input type="time" id="hora" name="hora">
</label>

<label for="datahora">data e hora:</label>
<input type="datetime-local" id="datahora" name="datahora">

<!-- number -->

<label for="idade">idade:</label>
<input type="number"id="idade" name="idade"
min="0" max="150"><br>

<!-- color -->

<label for="cor">Escolha uma cor:</label>
<input type="color" id="cor" name="cor">

<!-- carregar arquivos -->

<label for ="arquivo">carregar arquivo:</label>
<input type="file" id="arquivo" name="arquivo">

<!-- dropdown -->

<label for="pais">País:</label>
<select id="pais"name="pais">
    <option value="brasil">Brasil</option>
    <option value="eua">Estados Unidos</option>
    <option value="japao">Japão</option>
</select>

<!-- telefone -->

<label for="telefone">Telefone:</label>
<input type="tel" id="telefone" name="telefone" 
placeholder="(00) 00000-0000"
pattern="[0-9]{2} [0-9]{5}-[0-9]{4}"required>

<!-- search -->

<label for="pesquisa"> O que vocês está procurando?</label><br>
<input type="search" id="pesquisa" name="pesquisa" placeholder="digite sua busca..."required><br><br>
<button type ="submit">pesquisar</button>

<!-- mais area de texto -->

<form>
    <label for="fname">Primeiro nome:</label><br>
    <textarea id="fname" name="fname" rows="4" cols="50">texto</textarea   ><br><br>
</form>
