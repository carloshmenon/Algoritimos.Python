<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
    <script src="./scripts/forms.js" defer></script>
</head>
<body>
    
    <h1>cadastro de usuarios</h1>

    <form id="formulario">
        <input type="text" id="nome" placeholder="digite seu nome" required>
        <input type="text" id="fone" placeholder="digite seu telefone" required>
        <input type="text" id="cpf" placeholder="digite seu cpf" required>
        <input type="text" id="email" placeholder="digite seu email" required>
        <input type="text" name="cidade" id="cidade" placeholder="digite sua cidade" required>

        <button type="reset">Cancelar</button>
        <button type="submit" id="cadastrar">Cadastrar</button>

    </form>


</body>
</html>
