<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Alunos</title>

    <style>
        body{
            font-family: Arial;
            margin: 40px;
            background: #f4f4f4;
        }

        .box{
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input{
            padding: 10px;
            margin: 5px;
        }

        button{
            padding: 10px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td{
            border: 1px solid #ccc;
            padding: 10px;
        }
    </style>
</head>

<body>

<h1>Sistema de Alunos com HTML</h1>

<div class="box">

    <h2>Cadastrar</h2>

    <form action="/cadastrar" method="POST">

        <input type="text" name="nome" placeholder="Nome">

        <input type="number" name="idade" placeholder="Idade">

        <button type="submit">
            Cadastrar
        </button>

    </form>

</div>


<div class="box">

    <h2>Atualizar</h2>

    <form action="/atualizar" method="POST">

        <input type="number" name="id" placeholder="ID">

        <input type="text" name="nome" placeholder="Nome">

        <input type="number" name="idade" placeholder="Idade">

        <button type="submit">
            Atualizar
        </button>

    </form>

</div>


<div class="box">

    <h2>Lista de Alunos</h2>

    <table>

        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Idade</th>
            <th>Ações</th>
        </tr>

        {% for aluno in alunos %}

        <tr>

            <td>{{ aluno[0] }}</td>
            <td>{{ aluno[1] }}</td>
            <td>{{ aluno[2] }}</td>

            <td>
                <a href="/deletar/{{ aluno[0] }}">
                    Excluir
                </a>
            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
