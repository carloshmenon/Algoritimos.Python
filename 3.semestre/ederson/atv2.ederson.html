<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>formulario academico</title>
    </head>
    <body>
<form action="send.php" method="post">
    <fieldset>
        <legend>Dados pessoais </legend>
    <label for="fname">Nome</label><br>
    <input type="text" id="fname" name="fname" value="" ><br><br>


    <label for="cpf">CPF:</label><br>
    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00"
    pattern="\d{3}\. \d{3}\. \d{3}- \d{2}"
    required
    ><br><br>
    
    <label for="data">data de nascimento:</label><br>
    <input type="date" id="data" name="data" required><br><br>
    </fieldset>

    <fieldset id="email">  
        <legend>contato</legend>
        <label for ="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="exemplo@gmail.com" required><br><br>
        
        <label for ="telefone">telefone:</label><br>
        <input type="tel" id="telefone" name="telefone" placeholder="(67) 9 9999-9999" required><br><br>

        <label for ="endereco">Endereço:</label><br>
        <input type="text" id="endereco" name="endereco" placeholder="Rua, número, bairro" required><br><br>
    </fieldset>

    <fieldset id="matricula">
        <legend>Matricula</legend>
        <label for="matricula">matricula:</label><br>
        <input type ="text" id="matricula" name="matricula" required><br><br>
 
    <label for="CURSO">Curso:</label>
        <select id="curso"name="curso">
            <option value="ADS">Análise e Desenvolvimento de Sistemas</option>
            <option value="Psicologia">Psicologia</option>
            <option value="Culinaria">Culinária</option>
    </select>
    <p>Turno:</p>
    <input type="radio" id="matutino" name="turno" value="Matutino">
    <label for="matutino">Matutino</label>
    <input type="radio" id="noturno" name="turno" value="Noturno">
    <label for="noturno">Noturno</label><br><br>

        <input type="checkbox" id="algoritomos" name="algoritomos" value="algoritomos">
    <label for="algoritomos">Algoritmos</label><br>
    <input type="checkbox" id="banco de dados" name="banco de dados" value="Banco de Dados">
    <label for="banco de dados">Banco de Dados</label><br>
    <input type="checkbox" id="engenharia de software" name="engenharia de software" value="Engenharia de Software">
    <label for="engenharia de software">Engenharia de Software</label><br>
    <input type="checkbox" id="inteligencia artificial" name="inteligencia artificial" value="Inteligência Artificial">
    <label for="inteligencia artificial">Inteligência Artificial</label><br>
    


</form>



</body> 
</html>
