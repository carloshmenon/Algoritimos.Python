<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .campo {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 6px;
      color: #111;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #3b82f6;
    }

    input.erro {
      border-color: #e53e3e;
    }

    input.ok {
      border-color: #38a169;
    }

    .mensagem {
      font-size: 13px;
      margin-top: 5px;
      min-height: 18px;
      color: #e53e3e;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      background-color: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #2563eb;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Cadastro</h1>

    <div class="campo">
      <label for="nome">Nome</label>
      <input type="text" id="nome" placeholder="Seu nome completo" oninput="validar('nome')">
      <p class="mensagem" id="msg-nome"></p>
    </div>

    <div class="campo">
      <label for="email">E-mail</label>
      <input type="text" id="email" placeholder="seu@email.com" oninput="validar('email')">
      <p class="mensagem" id="msg-email"></p>
    </div>

    <div class="campo">
      <label for="cpf">CPF</label>
      <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14"
             oninput="mascaraCPF(this); validar('cpf')">
      <p class="mensagem" id="msg-cpf"></p>
    </div>

    <div class="campo">
      <label for="tel">Telefone</label>
      <input type="text" id="tel" placeholder="(67) 99999-9999" maxlength="15"
             oninput="mascaraTel(this); validar('tel')">
      <p class="mensagem" id="msg-tel"></p>
    </div>

    <div class="campo">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Mínimo 8 caracteres" oninput="validar('senha')">
      <p class="mensagem" id="msg-senha"></p>
    </div>

    <button onclick="enviar()">Cadastrar</button>
  </div>

  <script>
    // Regras de validação com Regex
    const regras = {
      nome: {
        regex: /^.{3,}$/,
        msg: 'Nome deve possuir pelo menos 3 caracteres.'
      },
      email: {
        regex: /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
        msg: 'E-mail inválido.'
      },
      cpf: {
        regex: /^\d{3}\.\d{3}\.\d{3}-\d{2}$/,
        msg: 'CPF deve estar no formato 000.000.000-00.'
      },
      tel: {
        regex: /^\(\d{2}\) \d{4,5}-\d{4}$/,
        msg: 'Telefone deve estar no formato (67) 99999-9999.'
      },
      senha: {
        regex: /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/,
        msg: 'Senha deve possuir 8 caracteres, letra maiúscula, minúscula e número.'
      }
    };

    function validar(campo) {
      const input = document.getElementById(campo);
      const msg   = document.getElementById('msg-' + campo);
      const valor = input.value;

      // Campo vazio: limpa o estado
      if (!valor) {
        input.className = '';
        msg.textContent = '';
        return false;
      }

      const valido = regras[campo].regex.test(valor);
      input.className = valido ? 'ok' : 'erro';
      msg.textContent = valido ? '' : regras[campo].msg;
      return valido;
    }

    // Máscara CPF: 000.000.000-00
    function mascaraCPF(el) {
      let v = el.value.replace(/\D/g, '').substring(0, 11);
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      el.value = v;
    }

    // Máscara Telefone: (00) 00000-0000
    function mascaraTel(el) {
      let v = el.value.replace(/\D/g, '').substring(0, 11);
      if (v.length >= 2) v = '(' + v.substring(0, 2) + ') ' + v.substring(2);
      if (v.length >= 10) v = v.substring(0, v.length - 4) + '-' + v.substring(v.length - 4);
      el.value = v;
    }

    function enviar() {
      const campos = ['nome', 'email', 'cpf', 'tel', 'senha'];

      // Valida todos os campos antes de enviar
      const todosValidos = campos.every(function(campo) {
        const input = document.getElementById(campo);

        // Se o campo estiver vazio, mostra o erro
        if (!input.value) {
          input.className = 'erro';
          document.getElementById('msg-' + campo).textContent = regras[campo].msg;
          return false;
        }

        return validar(campo);
      });

      if (todosValidos) {
        alert('Cadastro realizado com sucesso!');
      }
    }
  </script>

</body>
</html>
